<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>图书商城</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:"Microsoft Yahei",sans-serif;
color:#333;
background:url("img/huasui.jpg") no-repeat center center fixed;
background-size:cover;
}
.header{width:100%;height:80px;padding:0 20px;background:#3498db;position:fixed;top:0;z-index:999;}
.logo{float:left;line-height:80px;}
.logo img{height:60px;vertical-align:middle;object-fit:cover;}
.top-nav{float:right;line-height:80px;}
.top-nav ul li{list-style:none;float:left;margin:0 15px;}
.top-nav ul li a{color:#fff;text-decoration:none;}
.icon{
display:inline-block;
transition:transform 0.3s;
}
.icon:hover{
transform:rotate(360deg);
}
.container{width:100%;margin:100px 0;overflow:hidden;}
.left-sidebar{float:left;width:20%;padding:15px;background:rgba(236,240,241,0.6);min-height:600px;}
.left-sidebar h3{text-align:center;margin-bottom:15px;}
.left-sidebar ul li{list-style:none;background:rgba(255,255,255,0.5);margin:10px 0;padding:8px;}
.main-content{float:left;width:60%;padding:20px;background:rgba(248,249,250,0.6);min-height:600px;}
.book-item{float:left;width:30%;margin:10px;background:rgba(255,255,255,0.6);padding:10px;}
.book-item img{width:100%;height:180px;object-fit:cover;}
.carousel{
width:100%;
height:300px;
overflow:hidden;
margin:0 0 15px;
}
.carousel-box{
animation:upMove 9s infinite;
}
.carousel-box img{
width:100%;
height:300px;
display:block;
object-fit:cover;
}
@keyframes upMove{
0%{transform:translateY(0);}
30%{transform:translateY(-300px);}
60%{transform:translateY(-600px);}
100%{transform:translateY(0);}
}
.hot-item{
float:left;width:23%;margin:1%;background:rgba(255,255,255,0.6);padding:8px;text-align:center;
transition:all 0.3s;
}
.hot-item img{width:100%;height:120px;object-fit:cover;}
.hot-item:hover{
transform:translateX(5px) scale(1.05);
box-shadow:0 5px 15px #ccc;
}
.new-book table{width:100%;border-collapse:collapse;}
.new-book th{background:rgba(52,152,219,0.7);color:#fff;}
.new-book th,td{border:1px solid #ddd;padding:8px;text-align:center;background:rgba(255,255,255,0.5);}
.right-sidebar{float:right;width:18%;padding:15px;background:rgba(255,243,205,0.6);min-height:600px;}
.promo-item{background:rgba(255,255,255,0.5);padding:15px;margin:15px 0;text-align:center;}
.back-top{background:#3498db;color:#fff;padding:10px;text-align:center;}
.footer{clear:both;background:rgba(52,152,219,0.7);color:#fff;text-align:center;padding:15px;margin-top:20px;}
.mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;}
.login-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:350px;background:rgba(255,255,255,0.85);padding:25px;display:none;}
.login-box.active,.mask.active{display:block;}
.tab{display:flex;margin-bottom:20px;}
.tab-item{flex:1;text-align:center;padding:10px;cursor:pointer;}
.tab-item.active{border-bottom:2px solid #3498db;}
.form-item{margin:10px 0;}
.form-item input{width:100%;padding:10px;border:1px solid #ddd;background:rgba(255,255,255,0.7);}
.btn{
width:100%;
padding:10px;
background:#3498db;
color:#fff;
border:none;
margin-top:10px;
transition:all 0.3s;
cursor:pointer;
}
.btn:hover{
transform:scale(1.03);
background:linear-gradient(45deg,#3498db,#67b8f0);
}
</style>
</head>
<body>
<div class="header">
<div class="logo"><img src="img/logo.png"></div>
<div class="top-nav">
<ul>
<li><a href="#" class="icon">🛒</a></li>
<li><a href="#" class="icon">🔍</a></li>
<li><a href="#" id="loginBtn">登录/注册</a></li>
<li><a href="#">首页</a></li>
<li><a href="#">新书</a></li>
<li><a href="#">分类</a></li>
<li><a href="#">热销</a></li>
</ul>
</div>
</div>
<div class="mask" id="mask"></div>
<div class="login-box" id="loginBox">
<div class="tab">
<div class="tab-item active" onclick="switchTab('login')">登录</div>
<div class="tab-item" onclick="switchTab('register')">注册</div>
</div>
<div id="loginForm">
<div class="form-item"><input type="text" id="user1" placeholder="用户名"></div>
<div class="form-item"><input type="password" id="pwd1" placeholder="密码"></div>
<button class="btn" onclick="login()">登录</button>
</div>
<div id="registerForm" style="display:none">
<div class="form-item"><input type="text" id="user2" placeholder="用户名"></div>
<div class="form-item"><input type="password" id="pwd2" placeholder="密码"></div>
<button class="btn" onclick="register()">注册</button>
</div>
</div>
<div class="container">
<div class="left-sidebar">
<h3>图书分类</h3>
<ul>
<li>文学小说</li><li>计算机技术</li><li>经管励志</li><li>少儿读物</li><li>生活艺术</li>
</ul>
</div>
<div class="main-content">
<div class="carousel">
<div class="carousel-box">
<img src="img/banner1.jpg">
<img src="img/banner2.jpg">
<img src="img/banner3.jpg">
</div>
</div>
<h3>图书展示</h3>
<div class="book-item"><img src="img/book1.jpg"><p>深入理解计算机系统</p></div>
<div class="book-item"><img src="img/book2.jpg"><p>C++ Primer</p></div>
<div class="book-item"><img src="img/book3.jpg"><p>数据结构与算法</p></div>
<h3>热门推荐</h3>
<div class="hot-item"><img src="img/hot1.jpg"><p>活着</p></div>
<div class="hot-item"><img src="img/hot2.jpg"><p>平凡的世界</p></div>
<div class="hot-item"><img src="img/hot3.jpg"><p>三体</p></div>
<div class="hot-item"><img src="img/hot4.jpg"><p>明朝那些事儿</p></div>
<h3>新书上市</h3>
<table class="new-book">
<tr><th>书名</th><th>作者</th><th>价格</th><th>日期</th></tr>
<tr><td>AI编程思维</td><td>李航</td><td>89</td><td>2025</td></tr>
<tr><td>Web开发</td><td>张鑫</td><td>79</td><td>2025</td></tr>
<tr><td>深度学习</td><td>王健</td><td>99</td><td>2025</td></tr>
</table>
</div>
<div class="right-sidebar">
<h3>促销</h3>
<div class="promo-item">满99减20</div>
<div class="promo-item">新书8折</div>
<div class="back-top">回到顶部</div>
</div>
</div>
<div class="footer">© 2025 图书商城 版权所有</div>
<script>
document.getElementById('loginBtn').onclick=function(){
document.getElementById('mask').classList.add('active')
document.getElementById('loginBox').classList.add('active')
}
document.getElementById('mask').onclick=function(){
document.getElementById('mask').classList.remove('active')
document.getElementById('loginBox').classList.remove('active')
}
function switchTab(type){
if(type=="login"){
document.getElementById('loginForm').style.display="block";
document.getElementById('registerForm').style.display="none";
}else{
document.getElementById('loginForm').style.display="none";
document.getElementById('registerForm').style.display="block";
}
}
function register(){
let user = document.getElementById('user2').value;
let pwd = document.getElementById('pwd2').value;
if(user==""||pwd==""){
alert('不能为空');
}else{
localStorage.setItem(user,pwd);
alert('注册成功');
}
}
function login(){
let user = document.getElementById('user1').value;
let pwd = document.getElementById('pwd1').value;
let pwdOk = localStorage.getItem(user);
if(pwdOk==pwd){
alert('登录成功');
document.getElementById('mask').classList.remove('active');
document.getElementById('loginBox').classList.remove('active');
}else{
alert('账号或密码错误');
}
}
</script>
</body>
</html>
